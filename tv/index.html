<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSync TV (Vanilla JS)</title>
    
    <!-- Dependencies -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        :root {
            --brand-color: #E50914; /* Netflix Red */
            --bg-color: #000000;
            --ui-bg: rgba(0, 0, 0, 0.7);
            --text-color: #ffffff;
            --focus-glow: 0 0 20px rgba(229, 9, 20, 0.8);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden; /* Lock screen for TV */
        }

        /* --- VIDEO LAYER --- */
        #video-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
        }
        video {
            width: 100%; height: 100%;
            object-fit: contain;
        }

        /* --- UI OVERLAY LAYER --- */
        #ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: opacity 0.4s ease;
            z-index: 10;
        }

        .header {
            padding: 40px 60px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .header h1 { margin: 0; font-size: 3rem; text-shadow: 0 2px 10px #000; font-weight: 800; }
        .header p { margin: 5px 0 0 0; font-size: 1.5rem; opacity: 0.8; }
        .badge { background: #333; padding: 8px 16px; border-radius: 8px; font-weight: bold; font-size: 1.2rem; }
        .badge.connected { background: #198754; }

        /* --- TV CONTROLS (REACT-TV-PLAYER STYLE) --- */
        .controls {
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 50%, transparent 100%);
            padding: 60px 5% 40px 5%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .buttons-row {
            display: flex;
            gap: 25px;
            margin-bottom: 30px;
        }

        .tv-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
            color: white;
            border-radius: 50%;
            width: 70px; height: 70px;
            font-size: 2rem;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s, background 0.2s;
        }

        .progress-row {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .time-label { font-size: 1.3rem; font-weight: bold; font-variant-numeric: tabular-nums; }

        .progress-bar-container {
            flex-grow: 1;
            height: 12px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            position: relative;
            /* Using a div instead of an input makes custom TV D-pad logic much easier */
        }

        .progress-fill {
            position: absolute;
            top: 0; left: 0;
            height: 100%;
            background: var(--brand-color);
            border-radius: 6px;
            width: 0%;
            transition: width 0.1s linear;
        }

        /* --- THE MAGIC TV FOCUS CLASSES --- */
        .tv-focused {
            outline: 4px solid var(--brand-color) !important;
            outline-offset: 4px;
            transform: scale(1.2);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: var(--focus-glow);
            z-index: 20;
        }

        .progress-bar-container.tv-focused {
            outline: 4px solid var(--brand-color);
            transform: scaleY(1.5);
            box-shadow: var(--focus-glow);
        }

        /* Subtitles styling */
        ::cue {
            color: #fff; background: transparent;
            font-size: 2.5rem; text-shadow: 0 2px 4px #000, 0 0 8px #000;
        }
    </style>
</head>
<body>

<div id="video-container">
    <video id="mediaPlayer"></video>
</div>

<div id="ui-layer">
    <div class="header">
        <div>
            <h1 id="movieTitle">Waiting for Host...</h1>
            <p id="movieDesc">Please wait for media to be pushed.</p>
        </div>
        <div id="statusBadge" class="badge">Connecting...</div>
    </div>

    <div class="controls">
        <div class="buttons-row">
            <!-- Data-indexes are critical for the custom Grid logic -->
            <button class="tv-btn focusable" data-index="0" id="btnRewind"><i class="bi bi-rewind-fill"></i></button>
            <button class="tv-btn focusable" data-index="1" id="btnPlay"><i class="bi bi-play-fill" id="playIcon"></i></button>
            <button class="tv-btn focusable" data-index="2" id="btnForward"><i class="bi bi-fast-forward-fill"></i></button>
            <button class="tv-btn focusable" data-index="3" id="btnCC"><i class="bi bi-badge-cc-fill"></i></button>
        </div>
        <div class="progress-row">
            <span class="time-label" id="currentTime">00:00</span>
            <div class="progress-bar-container focusable" data-index="4" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span class="time-label" id="totalTime">00:00</span>
        </div>
    </div>
</div>

<script>
    // --- 1. CORE VARIABLES ---
    const SOCKET_URL = "https://socket.elvistony.dev";
    let socket = null;
    let roomCode = window.location.hash.substring(1); // Gets "#12345" -> "12345"
    let isNetworkEvent = false;
    let hls = null;
    
    const video = document.getElementById('mediaPlayer');
    const uiLayer = document.getElementById('ui-layer');
    const playIcon = document.getElementById('playIcon');
    const progressFill = document.getElementById('progressFill');
    const statusBadge = document.getElementById('statusBadge');
    
    // --- 2. THE VANILLA JS TV D-PAD STATE MACHINE ---
    // Instead of a library, we use a rigid array. 0-3 are buttons, 4 is the progress bar.
    const focusables = document.querySelectorAll('.focusable');
    let currentFocusIndex = 1; // Start on Play button
    let previousTopRowIndex = 1;

    function renderFocus() {
        focusables.forEach(el => el.classList.remove('tv-focused'));
        focusables[currentFocusIndex].classList.add('tv-focused');
    }

    // Initial render
    renderFocus();

    // The Master Key Interceptor
    document.addEventListener('keydown', (e) => {
        // Prevent default scrolling
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter', ' '].includes(e.key)) {
            e.preventDefault();
            showUI(); // Wake up UI on any remote press
        }

        switch(e.key) {
            case 'ArrowRight':
                if (currentFocusIndex < 3) {
                    currentFocusIndex++;
                } else if (currentFocusIndex === 4) {
                    // If on progress bar, seek forward 10s
                    seekVideo(10);
                }
                break;
            case 'ArrowLeft':
                if (currentFocusIndex > 0 && currentFocusIndex <= 3) {
                    currentFocusIndex--;
                } else if (currentFocusIndex === 4) {
                    // If on progress bar, seek backward 10s
                    seekVideo(-10);
                }
                break;
            case 'ArrowDown':
                if (currentFocusIndex < 4) {
                    previousTopRowIndex = currentFocusIndex;
                    currentFocusIndex = 4; // Drop down to progress bar
                }
                break;
            case 'ArrowUp':
                if (currentFocusIndex === 4) {
                    currentFocusIndex = previousTopRowIndex; // Go back up to last used button
                }
                break;
            case 'Enter':
            case ' ':
                // Execute action based on current focus
                executeFocusAction();
                break;
        }
        renderFocus();
    });

    function executeFocusAction() {
        switch(currentFocusIndex) {
            case 0: seekVideo(-10); break; // Rewind
            case 1: togglePlay(); break;   // Play/Pause
            case 2: seekVideo(10); break;  // Forward
            case 3: toggleCaptions(); break; // CC
            case 4: togglePlay(); break;   // Pressing enter on progress bar toggles play
        }
    }

    // --- 3. VIDEO CONTROLS LOGIC ---
    function togglePlay() {
        if (video.paused) {
            video.play();
            emitNetworkCommand('play');
        } else {
            video.pause();
            emitNetworkCommand('pause');
        }
    }

    function seekVideo(seconds) {
        video.currentTime += seconds;
        emitNetworkCommand('seek', video.currentTime);
    }

    function toggleCaptions() {
        if (video.textTracks.length > 0) {
            const track = video.textTracks[0];
            track.mode = track.mode === 'showing' ? 'hidden' : 'showing';
        }
    }

    // Update UI Events
    video.addEventListener('play', () => { playIcon.className = "bi bi-pause-fill"; });
    video.addEventListener('pause', () => { playIcon.className = "bi bi-play-fill"; });
    
    video.addEventListener('timeupdate', () => {
        if (!video.duration) return;
        const percent = (video.currentTime / video.duration) * 100;
        progressFill.style.width = `${percent}%`;
        document.getElementById('currentTime').innerText = formatTime(video.currentTime);
    });

    video.addEventListener('loadedmetadata', () => {
        document.getElementById('totalTime').innerText = formatTime(video.duration);
    });

    // Auto-hide UI logic
    let uiTimeout;
    function showUI() {
        uiLayer.style.opacity = '1';
        clearTimeout(uiTimeout);
        if (!video.paused) {
            uiTimeout = setTimeout(() => { uiLayer.style.opacity = '0'; }, 4000);
        }
    }
    video.addEventListener('play', showUI);
    video.addEventListener('pause', () => { uiLayer.style.opacity = '1'; clearTimeout(uiTimeout); });

    function formatTime(seconds) {
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = Math.floor(seconds % 60);
        if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    // --- 4. SOCKET & NETWORK LOGIC ---
    if (!roomCode) {
        document.getElementById('movieTitle').innerText = "No Room Provided";
        document.getElementById('movieDesc').innerText = "Please open this app with a #RoomCode in the URL.";
    } else {
        socket = io(SOCKET_URL);

        socket.on('connect', () => {
            statusBadge.innerText = `Room: ${roomCode}`;
            statusBadge.classList.add('connected');
            socket.emit('join', roomCode);
        });

        socket.on('disconnect', () => {
            statusBadge.innerText = "Disconnected";
            statusBadge.classList.remove('connected');
        });

        socket.on('welcome', (data) => { if (data.msg?.context) loadMedia(data.msg.context); });
        socket.on('context', (data) => { if (data.context) loadMedia(data.context); });
        socket.on('message', handleNetworkMessage);
    }

    function emitNetworkCommand(type, payload = null) {
        if (isNetworkEvent || !socket || !socket.connected) return;
        socket.emit('message', { room: roomCode, msg: { type: type, payload: payload } });
    }

    function handleNetworkMessage(data) {
        if (data.from === socket.id) return;
        const msgType = data.msg?.type;

        isNetworkEvent = true;
        if (msgType === 'play') video.play().catch(e => console.log(e));
        if (msgType === 'pause') video.pause();
        if (msgType === 'seek') video.currentTime = parseInt(data.msg.payload);
        if (msgType === 'stream') video.currentTime = 0; video.pause();
        
        setTimeout(() => { isNetworkEvent = false; }, 150); // Release latch
    }

    // --- 5. MEDIA LOADING (HLS & MP4) ---
    function loadMedia(context) {
        document.getElementById('movieTitle').innerText = context.title || "Unknown Title";
        document.getElementById('movieDesc').innerText = context.desc || "";

        if (hls) { hls.destroy(); }
        video.innerHTML = ''; // Clear old subtitles

        if (context.subs) {
            const track = document.createElement('track');
            track.kind = 'captions'; track.label = 'Admin Subtitles'; track.srclang = 'en';
            track.src = context.subs; track.default = true;
            video.appendChild(track);
            track.mode = 'showing';
        }

        const url = context.url;
        if (url.includes('.m3u8') && Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
        } else {
            video.src = url;
        }
    }
</script>
</body>
</html>
