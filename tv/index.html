<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSync TV (Vanilla JS)</title>
    
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        :root {
            --brand-color: #E50914; /* Netflix Red */
            --bg-color: #000000;
            --ui-bg: rgba(0, 0, 0, 0.7);
            --text-color: #ffffff;
            --focus-glow: 0 0 20px rgba(229, 9, 20, 0.9);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        /* --- VIDEO LAYER --- */
        #video-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
        }
        video {
            width: 100%; height: 100%;
            object-fit: contain;
            background-color: #000;
        }

        /* --- UI OVERLAY LAYER --- */
        #ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: opacity 0.4s ease;
            z-index: 10;
            zoom: 0.9; /* 10% Scale Down */
        }

        .header {
            padding: 25px 45px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .header h1 { margin: 0; font-size: 2.2rem; text-shadow: 0 2px 10px #000; font-weight: 800; }
        .header p { margin: 4px 0 0 0; font-size: 1.1rem; opacity: 0.75; }
        
        /* Minimalist Status Badge */
        #statusBadge { 
            background: transparent; 
            padding: 6px 12px; 
            font-weight: 600; 
            font-size: 1.2rem; 
            opacity: 0.8;
            display: flex;
            align-items: center;
            gap: 12px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* --- TV CONTROLS PANEL --- */
        .controls {
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 60%, transparent 100%);
            padding: 40px 5% 30px 5%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .buttons-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .tv-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid transparent;
            color: white;
            border-radius: 50%;
            width: 55px; height: 55px;
            font-size: 1.4rem;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), background 0.2s, opacity 0.2s, color 0.2s;
        }

        /* CC Active Indicator */
        .tv-btn.active {
            background: rgba(255, 255, 255, 0.95) !important;
            color: var(--bg-color) !important;
        }

        .progress-row {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .time-label { font-size: 1.1rem; opacity: 0.8; font-variant-numeric: tabular-nums; }

        /* --- PROGRESS TRACK --- */
        .progress-bar-container {
            flex-grow: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 3px;
            position: relative;
            transition: transform 0.2s, background-color 0.2s;
        }

        .progress-fill {
            position: absolute;
            top: 0; left: 0;
            height: 100%;
            background: var(--brand-color);
            border-radius: 3px;
            width: 0%;
        }

        .progress-thumb {
            position: absolute;
            right: -8px; 
            top: 50%;
            transform: translateY(-50%) scale(0);
            width: 16px; height: 16px;
            background-color: var(--brand-color);
            border-radius: 50%;
            box-shadow: var(--focus-glow);
            transition: transform 0.15s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* --- FOCUS MECHANICS --- */
        .tv-focused {
            outline: 3px solid var(--brand-color) !important;
            outline-offset: 3px;
            transform: scale(1.15);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: var(--focus-glow);
            z-index: 20;
            opacity: 1 !important;
        }

        .progress-bar-container.tv-focused {
            outline: none !important;
            box-shadow: none !important;
            background: rgba(255, 255, 255, 0.4);
            transform: scaleY(1.3);
        }

        .progress-bar-container.tv-focused .progress-thumb {
            transform: translateY(-50%) scale(1.3);
        }

        /* --- QR MODAL OVERLAY --- */
        #qr-modal {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 100;
            zoom: 0.9; /* Match 10% scale down */
        }

        #qr-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .qr-container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        #qr-canvas img {
            display: block;
        }

        .qr-text {
            font-size: 1.4rem;
            font-weight: 600;
            text-align: center;
            max-width: 500px;
        }

        .qr-subtext {
            font-size: 1rem;
            opacity: 0.6;
            margin-top: 10px;
        }

        ::cue {
            color: #fff; background: transparent;
            font-size: 2.2rem; text-shadow: 0 2px 4px #000, 0 0 8px #000;
        }
    </style>
</head>
<body>

<div id="video-container">
    <video id="mediaPlayer" playsinline crossorigin="anonymous" poster="player-standby.png"></video>
</div>

<div id="ui-layer">
    <div class="header">
        <div>
            <h1 id="movieTitle">Waiting for Host...</h1>
            <p id="movieDesc">Please wait for media to be pushed.</p>
        </div>
        <div id="statusBadge">
            <span><i class="bi bi-people-fill"></i> <span id="userCountDisplay">1</span></span>
            <span style="opacity: 0.5;">|</span>
            <span>#<span id="roomCodeDisplay">...</span></span>
            <span style="opacity: 0.5;">|</span>
            <span>v1.0.2</span>
        </div>
    </div>

    <div class="controls">
        <div class="buttons-row">
            <button class="tv-btn focusable" data-index="0" id="btnRewind"><i class="bi bi-rewind-fill"></i></button>
            <button class="tv-btn focusable" data-index="1" id="btnPlay"><i class="bi bi-play-fill" id="playIcon"></i></button>
            <button class="tv-btn focusable" data-index="2" id="btnForward"><i class="bi bi-fast-forward-fill"></i></button>
            <button class="tv-btn focusable" data-index="3" id="btnSync" title="Force Sync All Clients"><i class="bi bi-clock-fill"></i></button>
            <button class="tv-btn focusable" data-index="4" id="btnCC"><i class="bi bi-badge-cc-fill"></i></button>
            <button class="tv-btn focusable" data-index="5" id="btnQR" title="Show Remote Control QR"><i class="bi bi-qr-code"></i></button>
        </div>
        <div class="progress-row">
            <span class="time-label" id="currentTime">00:00</span>
            <div class="progress-bar-container focusable" data-index="6" id="progressBar">
                <div class="progress-fill" id="progressFill">
                    <div class="progress-thumb" id="progressThumb"></div>
                </div>
            </div>
            <span class="time-label" id="totalTime">00:00</span>
        </div>
    </div>
</div>

<div id="qr-modal">
    <div class="qr-container">
        <div id="qr-canvas"></div>
    </div>
    <div class="qr-text" id="qrUrlText">Scan to Connect Remote</div>
    <div class="qr-subtext">Press OK to close</div>
</div>

<script>
    // --- 1. CORE PROPERTIES ---
    const SOCKET_URL = "https://socket.elvistony.dev";
    let socket = null;
    
    const urlParams = new URLSearchParams(window.location.search);
    let roomCode = window.location.hash.substring(1) || urlParams.get('room') || urlParams.get('id');
    
    let lastLocalActionTime = 0;
    const DEBOUNCE_WINDOW = 800; 
    let hls = null;
    let qrGenerated = false;

    // Smooth Scrubbing Engine parameters
    let isScrubbing = false;
    let virtualTime = 0;
    let scrubDebounceTimeout = null;
    
    const video = document.getElementById('mediaPlayer');
    const uiLayer = document.getElementById('ui-layer');
    const playIcon = document.getElementById('playIcon');
    const progressFill = document.getElementById('progressFill');
    const statusBadge = document.getElementById('statusBadge');
    const qrModal = document.getElementById('qr-modal');
    const btnCC = document.getElementById('btnCC');
    const userCountDisplay = document.getElementById('userCountDisplay');
    const roomCodeDisplay = document.getElementById('roomCodeDisplay');
    
    roomCodeDisplay.innerText = roomCode || "...";

    // --- 2. GRID FOCUS MANAGEMENT ---
    const focusables = document.querySelectorAll('.focusable');
    let currentFocusIndex = 1; 
    let previousTopRowIndex = 1;

    function renderFocus() {
        focusables.forEach(el => el.classList.remove('tv-focused'));
        if (qrModal.classList.contains('active')) return; 
        focusables[currentFocusIndex].classList.add('tv-focused');

        // Reset virtual scrubbing state if focus leaves the slider line
        if (currentFocusIndex !== 6 && isScrubbing) {
            isScrubbing = false;
        }
    }

    renderFocus();

    document.addEventListener('keydown', (e) => {
        // Handle QR Modal Dismissal (Only OK / Enter / Space)
        if (qrModal.classList.contains('active')) {
            e.preventDefault();
            if (e.key === 'Enter' || e.key === ' ') {
                qrModal.classList.remove('active');
                renderFocus();
            }
            return;
        }

        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter', ' '].includes(e.key)) {
            e.preventDefault();
            showUI(); 
        }

        switch(e.key) {
            case 'ArrowRight':
                if (currentFocusIndex < 5) {
                    currentFocusIndex++;
                } else if (currentFocusIndex === 6) {
                    handleScrub(15); // Shift virtual pointer ahead instantly
                }
                break;
            case 'ArrowLeft':
                if (currentFocusIndex > 0 && currentFocusIndex <= 5) {
                    currentFocusIndex--;
                } else if (currentFocusIndex === 6) {
                    handleScrub(-15); // Shift virtual pointer behind instantly
                }
                break;
            case 'ArrowDown':
                if (currentFocusIndex < 6) {
                    previousTopRowIndex = currentFocusIndex;
                    currentFocusIndex = 6; 
                }
                break;
            case 'ArrowUp':
                if (currentFocusIndex === 6) {
                    currentFocusIndex = previousTopRowIndex; 
                }
                break;
            case 'Enter':
            case ' ':
                executeFocusAction();
                break;
        }
        renderFocus();
    });

    function executeFocusAction() {
        switch(currentFocusIndex) {
            case 0: seekVideo(-10); break; 
            case 1: togglePlay(); break;   
            case 2: seekVideo(10); break;  
            case 3: forceGlobalSync(); break; 
            case 4: toggleCaptions(); break; 
            case 5: showRemoteQR(); break;    
            case 6: togglePlay(); break;   
        }
    }

    // --- 3. FLUID SCRUBBING ENGINE ---
    function handleScrub(seconds) {
        if (!video.duration) return;
        
        // Lock video updates during active remote holding sessions
        if (!isScrubbing) {
            isScrubbing = true;
            virtualTime = video.currentTime;
        }

        // Bound variables inside valid range constraints
        virtualTime = Math.max(0, Math.min(video.duration, virtualTime + seconds));
        
        // Direct, instantaneous UI rendering updates without waiting for internal buffers
        const percent = (virtualTime / video.duration) * 100;
        progressFill.style.width = `${percent}%`;
        document.getElementById('currentTime').innerText = formatTime(virtualTime);

        // Debounce window clears out fast triggers to prevent system buffer pipeline lock
        clearTimeout(scrubDebounceTimeout);
        scrubDebounceTimeout = setTimeout(() => {
            if (!isScrubbing) return;
            isScrubbing = false;
            
            lastLocalActionTime = Date.now();
            video.currentTime = Math.floor(virtualTime);
            emitNetworkCommand('seek', Math.floor(virtualTime));
        }, 400); // 400ms filter block window
    }

    function togglePlay() {
        showUI();
        
        // If a scrub timeout is pending, force it to execute immediately before playing/pausing
        if (isScrubbing) {
            clearTimeout(scrubDebounceTimeout);
            isScrubbing = false;
            video.currentTime = Math.floor(virtualTime);
            emitNetworkCommand('seek', Math.floor(virtualTime));
        }

        lastLocalActionTime = Date.now();
        
        // Use the visual state of the Play/Pause icon to determine user intent.
        if (playIcon.classList.contains("bi-play-fill")) {
            video.play().then(() => {
                emitNetworkCommand('play');
            }).catch(e => {
                console.log("Playback failed:", e);
                emitNetworkCommand('play');
            });
            playIcon.className = "bi bi-pause-fill";
        } else {
            video.pause();
            emitNetworkCommand('pause');
            playIcon.className = "bi bi-play-fill";
        }
    }

    function seekVideo(seconds) {
        showUI();
        lastLocalActionTime = Date.now();
        video.currentTime += seconds;
        emitNetworkCommand('seek', Math.floor(video.currentTime));
    }

    function forceGlobalSync() {
        showUI();
        lastLocalActionTime = Date.now();
        video.pause();
        emitNetworkCommand('pause');
        emitNetworkCommand('seek', Math.floor(video.currentTime));
        
        const syncBtn = document.getElementById('btnSync');
        syncBtn.style.background = '#198754';
        setTimeout(() => { syncBtn.style.background = ''; }, 400);
    }

    function toggleCaptions() {
        if (video.textTracks.length > 0) {
            const track = video.textTracks[0];
            if (track.mode === 'showing') {
                track.mode = 'hidden';
                btnCC.classList.remove('active');
            } else {
                track.mode = 'showing';
                btnCC.classList.add('active');
            }
        }
    }

    function showRemoteQR() {
        if (!roomCode) return;
        const targetUrl = `https://elvistony.dev/cinesync/remote/#${roomCode}`;
        
        if (!qrGenerated) {
            new QRCode(document.getElementById("qr-canvas"), {
                text: targetUrl,
                width: 200, height: 200,
                colorDark : "#000000", colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
            qrGenerated = true;
        }
        qrModal.classList.add('active');
    }

    // --- 4. HARDWARE STATE INTERCEPTORS ---
    video.addEventListener('play', () => { 
        playIcon.className = "bi bi-pause-fill"; 
        showUI();
    });

    video.addEventListener('pause', () => { 
        playIcon.className = "bi bi-play-fill"; 
        uiLayer.style.opacity = '1'; 
        clearTimeout(uiTimeout);
    });

    video.addEventListener('timeupdate', () => {
        // Suspend UI engine timeline adjustments if user is moving slider manually
        if (isScrubbing || !video.duration) return;
        const percent = (video.currentTime / video.duration) * 100;
        progressFill.style.width = `${percent}%`;
        document.getElementById('currentTime').innerText = formatTime(video.currentTime);
    });

    video.addEventListener('loadedmetadata', () => {
        document.getElementById('totalTime').innerText = formatTime(video.duration);
    });

    let uiTimeout;
    function showUI() {
        if (qrModal.classList.contains('active')) return;
        uiLayer.style.opacity = '1';
        clearTimeout(uiTimeout);
        if (!video.paused) {
            uiTimeout = setTimeout(() => { uiLayer.style.opacity = '0'; }, 3500);
        }
    }

    function formatTime(seconds) {
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = Math.floor(seconds % 60);
        if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    // --- 5. NETWORK SIGNAL SIGNALS ---
    if (!roomCode) {
        document.getElementById('movieTitle').innerText = "Missing Room Assignment";
        document.getElementById('movieDesc').innerText = "Provide a room target parameter via hash link (#000000) or URL query (?room=000000).";
    } else {
        socket = io(SOCKET_URL);

        socket.on('connect', () => {
            socket.emit('join', roomCode);
        });

        socket.on('disconnect', () => {
            userCountDisplay.innerText = "0";
            userCountDisplay.style.color = "#E50914"; // Turn red if disconnected
        });

        socket.on('welcome', (data) => { 
            userCountDisplay.innerText = data.msg?.count || 1;
            userCountDisplay.style.color = ""; // Reset color
            if (data.msg?.context) loadMedia(data.msg.context); 
        });
        
        socket.on('roomupdate', (data) => {
            if (data.msg?.count) userCountDisplay.innerText = data.msg.count;
        });

        socket.on('context', (data) => { if (data.context) loadMedia(data.context); });
        socket.on('message', handleNetworkMessage);
    }

    function emitNetworkCommand(type, payload = null) {
        if (!socket || !socket.connected) return;
        const packet = { 
            room: roomCode, 
            msg: { type: type, payload: payload, timestamp: Date.now() } 
        };
        socket.emit('message', packet);
    }

    function handleNetworkMessage(data) {
        if (data.from === socket.id) return;
        if (Date.now() - lastLocalActionTime < DEBOUNCE_WINDOW) return;

        const msgType = data.msg?.type;
        if (!msgType) return;

        if (msgType === 'play') video.play().catch(e => console.log(e));
        if (msgType === 'pause') video.pause();
        if (msgType === 'seek') {
            isScrubbing = false; // Override any active local scrub if a global update breaks in
            video.currentTime = parseInt(data.msg.payload);
        }
        if (msgType === 'stream') { video.currentTime = 0; video.pause(); }
    }

    // --- 6. SUBTITLE SHIFTING LOGIC ---
    // async function getShiftedSubtitleUrl(vttUrl, offsetMs) {
    //     try {
    //         const res = await fetch(vttUrl);
    //         if (!res.ok) throw new Error("VTT Fetch failed");
    //         let text = await res.text();
            
    //         // Regex to match standard VTT timestamps (HH:MM:SS.mmm or MM:SS.mmm)
    //         const timeRegex = /(?:(\d{2,}):)?(\d{2}):(\d{2})\.(\d{3})/g;

    //             let time = parseInt(ms) + (parseInt(s) * 1000) + (parseInt(m) * 60000);
    //             if (h) time += parseInt(h) * 3600000;

    //             if (time < 0) time = 0; // Prevent negative time
                
    //             const newH = Math.floor(time / 3600000);
    //             time %= 3600000;
    //             const newM = Math.floor(time / 60000);
    //             time %= 60000;
    //             const newS = Math.floor(time / 1000);
    //             const newMs = time % 1000;
                
    //             const pad = (num, len) => String(num).padStart(len, '0');
    //             return `${newH > 0 ? pad(newH, 2) + ':' : (h ? '00:' : '')}${pad(newM, 2)}:${pad(newS, 2)}.${pad(newMs, 3)}`;
    //         });
            
    //         const blob = new Blob([text], { type: 'text/vtt' });
    //         return URL.createObjectURL(blob);
    //     } catch (e) {
    //         console.warn("Failed to shift subtitle, falling back to original URL:", e);
    //         return vttUrl;

    // }

    // --- 6. SUBTITLE SHIFTING LOGIC ---
        async function getShiftedSubtitleUrl(vttUrl, offsetMs) {
        try {
            let res;
            try {
                // Attempt standard fetch
                res = await fetch(vttUrl);
                if (!res.ok) throw new Error("Network response was not ok");
            } catch (corsError) {
                // If CORS blocks it, route through a public proxy
                console.warn("Direct subtitle fetch blocked by CORS. Using proxy...");
                res = await fetch(`https://corsproxy.io/?${encodeURIComponent(vttUrl)}`);
                if (!res.ok) throw new Error("Proxy fetch failed");
            }
            
            let text = await res.text();
            
            // If no offset is needed, just return the blob directly
            if (offsetMs === 0) {
                const blob = new Blob([text], { type: 'text/vtt' });
                return URL.createObjectURL(blob);
            }
            
            // Regex to match standard VTT timestamps (HH:MM:SS.mmm or MM:SS.mmm)
            const timeRegex = /(?:(\d{2,}):)?(\d{2}):(\d{2})\.(\d{3})/g;
            
            text = text.replace(timeRegex, (match, h, m, s, ms) => {
                let time = parseInt(ms) + (parseInt(s) * 1000) + (parseInt(m) * 60000);
                if (h) time += parseInt(h) * 3600000;
                
                time += offsetMs;
                if (time < 0) time = 0; // Prevent negative time
                
                const newH = Math.floor(time / 3600000);
                time %= 3600000;
                const newM = Math.floor(time / 60000);
                time %= 60000;
                const newS = Math.floor(time / 1000);
                const newMs = time % 1000;
                
                const pad = (num, len) => String(num).padStart(len, '0');
                return `${newH > 0 ? pad(newH, 2) + ':' : (h ? '00:' : '')}${pad(newM, 2)}:${pad(newS, 2)}.${pad(newMs, 3)}`;
            });
            
            const blob = new Blob([text], { type: 'text/vtt' });
            return URL.createObjectURL(blob);
        } catch (e) {
            console.error("Critical failure fetching subtitles:", e);
            return vttUrl; // Fallback to raw URL as a last resort
        }
    }

    // --- 7. HLS ENGINE SOURCE CONTROLLER ---
    async function loadMedia(context) {
        document.getElementById('movieTitle').innerText = context.title || "Unknown Title";
        document.getElementById('movieDesc').innerText = context.desc || "";

        if (hls) { hls.destroy(); hls = null; }
        video.innerHTML = ''; 

        if (context.subs) {
            const track = document.createElement('track');
            track.kind = 'captions'; track.label = 'En'; track.srclang = 'en';
            track.default = true;

            const offsetMs = parseInt(context.subsOffset) || 0;
            if (offsetMs !== 0) {
                track.src = await getShiftedSubtitleUrl(context.subs, offsetMs);
            } else {
                track.src = context.subs;
            }
            
            video.appendChild(track);
            track.mode = 'showing';
            
            // Set initial UI state for CC Button (ON / ACTIVE)
            btnCC.classList.add('active');
            btnCC.style.opacity = '1';
        } else {
            // Set initial UI state for CC Button (DISABLED/OFF)
            btnCC.classList.remove('active');
            btnCC.style.opacity = '0.3';
        }

        const url = context.url;
        if (url.includes('.m3u8') && Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
        } else {
            video.src = url;
        }
    }
</script>
</body>
